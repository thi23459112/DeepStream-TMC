# ============================================================
# DeepStream 車流計數 - camC 設定
# ============================================================

source_id: "camC"                     # 來源代號（OSD 標記 / 輸出檔名前綴 / DB 欄位）

# ------------------------------------------------------------
# 裝置資訊
# ------------------------------------------------------------
device:
  code: "EdgeX317"                    # 邊緣機器代號，寫進 DB DeviceCode 欄位

# ----------------------------------------------------------------------------
# 輸入來源 ⭐
# ----------------------------------------------------------------------------
# 可填：
#   "videos/test1.avi"                # 影片（相對路徑，放在 videos/ 資料夾）
#   "rtsp://user:pass@ip:port/path"   # RTSP 串流
source: "videos/test3.avi"

stream_fps: 15.0                      # 串流 FPS
start_time: "2025-05-22 00:23:57"     # 影片首幀對應的真實時刻（RTSP 自動忽略）
                                      # 格式：YYYY-MM-DD HH:MM:SS

# ------------------------------------------------------------
# 模型 Engine
# ------------------------------------------------------------
weight_imgsz: 640                     # 車輛模型輸入解析度
weight_batch_size: 4                  # engine max batch

# ------------------------------------------------------------
# 偵測閾值
# ------------------------------------------------------------
detect:
  car_conf: 0.25                      # PGIE 信心值閾值（所有車種共用）
  car_iou:  0.45                      # PGIE NMS IoU 閾值

# ------------------------------------------------------------
# ROI / 裁切遮罩 ⭐
# ------------------------------------------------------------
geometry:
  base_w: 1920                        # 來源畫面寬
  base_h: 1080                        # 來源畫面高

  # 計數 ROI（可定義多個，一台車經過多個 ROI 各寫一筆 DB）
  regions:
    1600001:                      # ROI_1
      - [100, 100]
      - [1000, 100]
      - [1000, 400]
      - [100, 400]
    1600002:                      # ROI_2
      - [1300, 100]
      - [1800, 100]
      - [1800, 400]
      - [1300, 400]
    1600003:                      # ROI_3
      - [100, 700]
      - [1000, 700]
      - [1000, 1000]
      - [100, 1000]
    1600004:                      # ROI_4
      - [1300, 700]
      - [1800, 700]
      - [1800, 1000]
      - [1300, 1000]
  
  # ROI → 路段名稱對照（寫進 DB FromRoadName / ToRoadName）
  region_names:
    1600001: "朝隆路(西)"
    1600002: "朝隆路(東)"
    1600003: "中山路"
    1600004: "進德大橋"
 
  # 裁切遮罩：此矩形以外不送進 PGIE（節省算力）
  crop_points:
    - [0,    50]
    - [1920, 50]
    - [1920, 1080]
    - [0,    1080]

# ------------------------------------------------------------
# 結算規則
# ------------------------------------------------------------
session:
  cleanup_frames: 30                  # 物件消失 N 幀後結算
  flush_interval_seconds: 0           # 每 N 秒把 pending 寫進 DB（0=即時）

# ------------------------------------------------------------
# 轉向量判定參數
# ------------------------------------------------------------
# min_roi_hits = 命中某 ROI 的最少幀數，低於此值視為擦邊噪音、不算經過該 ROI
track_logic:
  min_roi_hits: 2

# ------------------------------------------------------------
# 輸出設定 ⭐
# ------------------------------------------------------------
output:
  save_output_video: true             # 可選：true / false  是否輸出推理後影片
  output_video_dir: "output_video"

  save_output_db: true                # 可選：true / false  是否寫入 SQLite DB
  output_db_dir: "output_db"          # DB 檔輸出資料夾

# ------------------------------------------------------------
# 本地顯示 ⭐
# ------------------------------------------------------------
display:
  show_window: true                  # 可選：true / false  本地預覽視窗
  show_fps_overlay: true              # 可選：true / false  畫面左上 FPS
  show_roi: true                      # 可選：true / false  ROI 黃線
  show_crop: true                     # 可選：true / false  裁切框青綠線

# ----------------------------------------------------------------------------
# RTSP 推流 ⭐
# ----------------------------------------------------------------------------
# 連線範例：rtsp://<邊緣機 IP>:<port>/<mount_path>
# 例：     rtsp://192.168.1.100:8554/camA
rtsp_push:
  enable: true                        # 可選：true / false
  port: 8554                          # RTSP server 監聽 port
  mount_path: "camC"                  # URL 路徑名稱（rtsp://IP:port/{mount_path}）
  bitrate: 4000000                    # bps，1080p 建議 4M~8M
  encoder: "h264"                     # 可選：h264（相容性高，推薦） / h265（檔案小，部分播放器不支援）

# ----------------------------------------------------------------------------
# 追蹤器 ⭐
# ----------------------------------------------------------------------------
# 微調該追蹤器內部參數 → 編輯 boxmot/configs/trackers/<type>.yaml
# 可選：'nvdcf', 'bytetrack', 'ocsort', 'fasttracker', 'sfsort', 'cbiou'
tracker:
  type: "fasttracker"                 # ⭐ 改這裡切換追蹤器
